<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>موقع عامر</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#2563eb,#0f172a);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(12px);
    padding:40px;
    border-radius:20px;
    text-align:center;
    width:90%;
    max-width:600px;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}

h1{
    margin-bottom:10px;
    font-size:40px;
}

p{
    font-size:18px;
    opacity:.9;
}

button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:10px;
    background:#ffffff;
    color:#2563eb;
    font-size:18px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    transform:scale(1.05);
}
</style>

</head>

<body>

<div class="card">
<h1>👋 أهلاً بك</h1>

<p>
هذا أول موقع لي مستضاف على GitHub Pages.
</p>

<button onclick="alert('مبروك! موقعك شغال 🎉')">
اضغط هنا
</button>

</div>

</body>
</html>
